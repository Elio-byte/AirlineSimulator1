<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Airline Simulator</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f172a; 
      color: #e2e8f0; 
      margin: 0; 
      padding: 15px; 
    }
    .container { max-width: 1000px; margin: auto; }
    h1 { text-align: center; color: #60a5fa; }
    .stats { 
      display: flex; flex-wrap: wrap; justify-content: space-around; 
      background: #1e2937; padding: 15px; border-radius: 10px; margin: 15px 0; 
      gap: 10px;
    }
    .card { 
      background: #1e2937; padding: 20px; margin: 15px 0; border-radius: 10px; 
    }
    button { 
      padding: 12px 20px; margin: 5px; border: none; border-radius: 6px; 
      cursor: pointer; font-size: 16px; 
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    input, select { padding: 10px; margin: 8px 0; width: 100%; border-radius: 6px; border: none; }
    .log { height: 300px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 8px; font-size: 14px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
    .modal-content { background: #1e2937; padding: 25px; width: 90%; max-width: 400px; margin: 100px auto; border-radius: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✈️ Airline Simulator</h1>

    <!-- Login -->
    <div id="loginPanel" class="card">
      <h2>👤 Accedi per salvare i progressi</h2>
      <input type="text" id="username" placeholder="Inserisci il tuo nome utente" />
      <br>
      <button class="btn-primary" onclick="login()">Entra</button>
      <button onclick="guestLogin()">Gioca come Ospite</button>
    </div>

    <!-- Gioco -->
    <div id="gamePanel" style="display: none;">
      <div class="stats">
        <div><strong>Giocatore:</strong> <span id="playerName"></span></div>
        <div><strong>Giorno:</strong> <span id="giorno">1</span></div>
        <div><strong>Denaro:</strong> €<span id="denaro">1.000.000</span></div>
        <div><strong>Aerei:</strong> <span id="numAerei">0</span></div>
        <div><strong>Reputazione:</strong> <span id="reputazione">50</span>/100</div>
      </div>

      <div class="card">
        <h2>🛒 Compra un Aereo</h2>
        <select id="aereoSelect">
          <option value="Cessna">Cessna — €150.000 (4 posti)</option>
          <option value="Embraer">Embraer E195 — €2.800.000 (100 posti)</option>
          <option value="A320">Airbus A320 — €4.500.000 (150 posti)</option>
          <option value="B737">Boeing 737 — €5.200.000 (160 posti)</option>
        </select>
        <button class="btn-primary" onclick="compraAereo()">Compra Aereo</button>
      </div>

      <div class="card">
        <h2>🌍 Crea Nuova Rotta</h2>
        <select id="partenza"></select>
        <select id="arrivo"></select>
        <select id="aereoUsato"></select>
        <input type="number" id="prezzo" value="89" placeholder="Prezzo biglietto">
        <button class="btn-success" onclick="creaRotta()">Crea Rotta</button>
      </div>

      <div class="card">
        <h2>⏩ Simula Giorno</h2>
        <button class="btn-primary" style="width:100%; padding:18px; font-size:18px;" onclick="simulaGiorno()">
          Avanza al Giorno Successivo
        </button>
      </div>

      <div class="card">
        <h2>Rotte Attive</h2>
        <div id="rotteList" style="min-height: 80px;"></div>
      </div>

      <div class="card">
        <button onclick="saveGame()" class="btn-success">💾 Salva Partita</button>
        <button onclick="loadGame()" class="btn-primary">📂 Carica Partita</button>
        <button onclick="logout()" class="btn-danger">Esci</button>
      </div>

      <div class="card">
        <h2>Log</h2>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <script>
    let denaro = 1000000, giorno = 1, reputazione = 50;
    let aerei = [], rotte = [];
    let currentUser = "";
    const citta = ["Roma", "Milano", "Napoli", "Palermo", "Venezia", "Torino", "Bari", "Cagliari"];
    const market = {
      "Cessna": {costo: 150000, capacita: 4, costo_op: 800},
      "Embraer": {costo: 2800000, capacita: 100, costo_op: 8500},
      "A320": {costo: 4500000, capacita: 150, costo_op: 12000},
      "B737": {costo: 5200000, capacita: 160, costo_op: 13500}
    };

    function login() {
      const name = document.getElementById("username").value.trim();
      if (!name) return alert("Inserisci un nome!");
      currentUser = name;
      startGame();
    }

    function guestLogin() {
      currentUser = "Guest_" + Math.floor(Math.random() * 9999);
      startGame();
    }

    function startGame() {
      document.getElementById("loginPanel").style.display = "none";
      document.getElementById("gamePanel").style.display = "block";
      document.getElementById("playerName").textContent = currentUser;

      // Popola città
      const p = document.getElementById("partenza");
      const a = document.getElementById("arrivo");
      citta.forEach(c => {
        let opt = new Option(c, c);
        p.add(opt.cloneNode(true));
        a.add(opt);
      });

      log("✈️ Benvenuto in Airline Simulator!");
      aggiornaUI();
    }

    function aggiornaUI() {
      document.getElementById("denaro").textContent = denaro.toLocaleString('it-IT');
      document.getElementById("giorno").textContent = giorno;
      document.getElementById("numAerei").textContent = aerei.length;
      document.getElementById("reputazione").textContent = reputazione;
      aggiornaRotte();
    }

    function log(msg) {
      const logDiv = document.getElementById("log");
      logDiv.innerHTML += `<div>${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function compraAereo() {
      const nome = document.getElementById("aereoSelect").value;
      const a = market[nome];
      if (denaro >= a.costo) {
        denaro -= a.costo;
        aerei.push({...a, nome: nome, manutenzione: 100});
        log(`✅ Comprato ${nome}!`);
        aggiornaUI();
      } else {
        alert("Denaro insufficiente!");
      }
    }

    function creaRotta() {
      if (aerei.length === 0) return alert("Compra almeno un aereo!");
      const partenza = document.getElementById("partenza").value;
      const arrivo = document.getElementById("arrivo").value;
      const idx = document.getElementById("aereoUsato").selectedIndex;
      const prezzo = parseInt(document.getElementById("prezzo").value) || 89;

      if (idx < 0) return alert("Seleziona un aereo!");

      rotte.push({
        partenza, arrivo, prezzo,
        aereo: aerei[idx]
      });
      log(`🌍 Rotta creata: ${partenza} → ${arrivo}`);
      aggiornaUI();
    }

    function simulaGiorno() {
      let guadagnoTot = 0;
      log(`--- Giorno ${giorno} ---`);

      for (let r of rotte) {
        const a = r.aereo;
        denaro -= a.costo_op;
        const pax = Math.floor(a.capacita * (Math.random() * 0.35 + 0.60));
        const ricavo = pax * r.prezzo;
        const guadagno = ricavo - a.costo_op;
        guadagnoTot += guadagno;
        log(`${r.partenza}→${r.arrivo}: ${pax} pax | +€${guadagno.toLocaleString('it-IT')}`);
      }

      denaro += guadagnoTot;
      giorno++;

      if (Math.random() < 0.25) {
        reputazione = Math.min(100, reputazione + 12);
        log("🎉 Boom turistico! +12 reputazione");
      }

      if (denaro < -300000) {
        alert("💥 GAME OVER - La tua compagnia è fallita!");
      }

      aggiornaUI();
    }

    function aggiornaRotte() {
      const div = document.getElementById("rotteList");
      if (rotte.length === 0) {
        div.innerHTML = "<p>Nessuna rotta attiva.</p>";
        return;
      }
      div.innerHTML = rotte.map(r => 
        `<p>✈️ ${r.partenza} → ${r.arrivo} | €${r.prezzo} | ${r.aereo.nome}</p>`
      ).join('');
    }

    function saveGame() {
      if (!currentUser) return;
      const data = {denaro, giorno, reputazione, aerei, rotte};
      localStorage.setItem("airline_" + currentUser, JSON.stringify(data));
      alert("✅ Partita salvata!");
    }

    function loadGame() {
      if (!currentUser) return;
      const saved = localStorage.getItem("airline_" + currentUser);
      if (saved) {
        const d = JSON.parse(saved);
        denaro = d.denaro; giorno = d.giorno; reputazione = d.reputazione;
        aerei = d.aerei; rotte = d.rotte;
        log("📂 Partita caricata con successo!");
        aggiornaUI();
      } else {
        log("Nessun salvataggio trovato.");
      }
    }

    function logout() {
      if (confirm("Vuoi uscire?")) {
        saveGame();
        location.reload();
      }
    }
  </script>
</body>
</html>
