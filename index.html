<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Airline Simulator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0e1a;
      color: #e0f0ff;
      margin: 0;
      padding: 10px;
    }
    .container { max-width: 1100px; margin: auto; }
    h1 { text-align: center; color: #4fc3f7; text-shadow: 0 0 15px rgba(79,195,247,0.5); }
    .card {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    .stats { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; background: rgba(15, 35, 70, 0.9); padding: 15px; border-radius: 16px; }
    button { padding: 14px 24px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: #2196f3; color: white; }
    .btn-success { background: #4caf50; color: white; }
    input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #1e2937; color: white; }
    .log { height: 180px; overflow-y: auto; background: rgba(10,14,26,0.8); padding: 15px; border-radius: 12px; }
    #map { height: 380px; border-radius: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✈️ THE AIRLINE SIMULATOR</h1>

    <div id="loginPanel" class="card">
      <h2 style="text-align:center;">Crea la tua Compagnia</h2>
      <input type="text" id="companyName" placeholder="Nome Compagnia (es. Italia Airways)" />
      <button class="btn-primary" style="width:100%; padding:16px;" onclick="startGame()">INIZIA A GESTIRE</button>
    </div>

    <div id="gamePanel" style="display:none;">
      <div class="stats">
        <div><strong>Compagnia:</strong> <span id="companyDisplay"></span></div>
        <div><strong>Giorno:</strong> <span id="giorno">1</span></div>
        <div><strong>Denaro:</strong> €<span id="denaro">300.000.000</span></div>
        <div><strong>Aerei:</strong> <span id="numAerei">0</span></div>
        <div><strong>Reputazione:</strong> <span id="reputazione">50</span></div>
      </div>

      <div class="card">
        <h2>🗺️ Mappa Voli in Tempo Reale</h2>
        <div id="map"></div>
      </div>

      <div class="card">
        <h2>🛒 Acquista Aerei</h2>
        <select id="aereoSelect">
          <option value="A320">Airbus A320neo - €48M</option>
          <option value="A350">Airbus A350-900 - €288M</option>
          <option value="B737">Boeing 737 MAX - €52M</option>
          <option value="B777">Boeing 777-300ER - €320M</option>
        </select>
        <button class="btn-primary" style="width:100%;" onclick="compraAereo()">ACQUISTA AEREO</button>
      </div>

      <div class="card">
        <h2>🌍 Nuova Rotta</h2>
        <select id="partenza"></select>
        <select id="arrivo"></select>
        <select id="aereoUsato"></select>
        <input type="number" id="prezzo" value="149" placeholder="Prezzo biglietto">
        <button class="btn-success" style="width:100%;" onclick="creaRotta()">CREA ROTTA</button>
      </div>

      <div class="card">
        <button class="btn-primary" style="width:100%; padding:18px;" onclick="simulaGiorno()">⏩ AVANZA GIORNO</button>
      </div>

      <div class="card">
        <h2>Rotte Attive</h2>
        <div id="rotteList"></div>
      </div>

      <div class="card">
        <button onclick="saveGame()" class="btn-success">💾 Salva</button>
        <button onclick="loadGame()" class="btn-primary">📂 Carica</button>
      </div>

      <div class="card">
        <h2>Log</h2>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, companyName = "SkyItalia";
    let denaro = 300000000;   // ← Modificato qui (300 milioni)
    let giorno = 1, reputazione = 50;
    let aerei = [], rotte = [];
    let markers = [];

    const aeroporti = [
      {name:"Roma FCO", lat:41.80, lon:12.25},
      {name:"Milano MXP", lat:45.63, lon:8.72},
      {name:"Napoli NAP", lat:40.88, lon:14.29},
      {name:"Venezia VCE", lat:45.50, lon:12.35},
      {name:"Palermo PMO", lat:38.18, lon:13.10},
      {name:"Londra LHR", lat:51.47, lon:-0.45},
      {name:"Parigi CDG", lat:49.01, lon:2.55},
      {name:"New York JFK", lat:40.64, lon:-73.78}
    ];

    const market = {
      "A320": {costo: 48000000, capacita: 150, costo_op: 45000},
      "A350": {costo: 288000000, capacita: 300, costo_op: 125000},
      "B737": {costo: 52000000, capacita: 160, costo_op: 48000},
      "B777": {costo: 320000000, capacita: 350, costo_op: 145000}
    };

    function startGame() {
      const name = document.getElementById("companyName").value.trim();
      if (name) companyName = name;

      document.getElementById("loginPanel").style.display = "none";
      document.getElementById("gamePanel").style.display = "block";
      document.getElementById("companyDisplay").textContent = companyName;

      const p = document.getElementById("partenza");
      const a = document.getElementById("arrivo");
      aeroporti.forEach(city => {
        let opt = new Option(city.name, city.name);
        p.add(opt.cloneNode(true));
        a.add(opt);
      });

      initMap();
      log(`✈️ Benvenuto a ${companyName}! Hai €300.000.000 di budget iniziale.`);
      aggiornaUI();
    }

    function initMap() {
      map = L.map('map').setView([42, 12], 5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
    }

    function aggiornaMappa() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      rotte.forEach(rotta => {
        const partenza = aeroporti.find(a => a.name === rotta.partenza);
        const arrivo = aeroporti.find(a => a.name === rotta.arrivo);
        if (!partenza || !arrivo) return;

        L.marker([partenza.lat, partenza.lon]).addTo(map).bindPopup(`<b>${partenza.name}</b>`);
        L.marker([arrivo.lat, arrivo.lon]).addTo(map).bindPopup(`<b>${arrivo.name}</b>`);
        L.polyline([[partenza.lat, partenza.lon], [arrivo.lat, arrivo.lon]], 
          {color: '#4fc3f7', weight: 3}).addTo(map);
      });
    }

    function aggiornaUI() {
      document.getElementById("denaro").textContent = denaro.toLocaleString('it-IT');
      document.getElementById("giorno").textContent = giorno;
      document.getElementById("numAerei").textContent = aerei.length;
      document.getElementById("reputazione").textContent = reputazione;
      aggiornaRotte();
      aggiornaMappa();
    }

    function log(msg) {
      const div = document.getElementById("log");
      div.innerHTML += `<div>${msg}</div>`;
      div.scrollTop = div.scrollHeight;
    }

    function compraAereo() {
      const tipo = document.getElementById("aereoSelect").value;
      const a = market[tipo];
      if (denaro >= a.costo) {
        denaro -= a.costo;
        aerei.push({tipo: tipo, ...a});
        log(`✅ Acquistato ${tipo}!`);
        aggiornaUI();
      } else alert("Denaro insufficiente!");
    }

    function creaRotta() {
      if (aerei.length === 0) return alert("Non hai aerei!");
      const partenza = document.getElementById("partenza").value;
      const arrivo = document.getElementById("arrivo").value;
      const idx = document.getElementById("aereoUsato").selectedIndex;
      const prezzo = parseInt(document.getElementById("prezzo").value) || 149;

      rotte.push({partenza, arrivo, prezzo, aereo: aerei[idx]});
      log(`🌍 Nuova rotta: ${partenza} → ${arrivo}`);
      aggiornaUI();
    }

    function simulaGiorno() {
      let guadagnoTot = 0;
      log(`<strong>=== GIORNO ${giorno} ===</strong>`);

      for (let r of rotte) {
        const a = r.aereo;
        denaro -= a.costo_op;
        const pax = Math.floor(a.capacita * (0.62 + Math.random() * 0.33));
        const ricavo = pax * r.prezzo;
        const guadagno = ricavo - a.costo_op;
        guadagnoTot += guadagno;
        log(`${r.partenza} → ${r.arrivo} | ${pax} pax | +€${guadagno.toLocaleString('it-IT')}`);
      }

      denaro += guadagnoTot;
      giorno++;
      if (Math.random() < 0.28) {
        reputazione = Math.min(100, reputazione + 10);
        log("🎉 Successo operativo! Reputazione +10");
      }
      aggiornaUI();
    }

    function aggiornaRotte() {
      const div = document.getElementById("rotteList");
      div.innerHTML = rotte.length ? rotte.map(r => 
        `<p>✈️ ${r.partenza} → ${r.arrivo} | ${r.aereo.tipo}</p>`
      ).join('') : "<p>Nessuna rotta attiva.</p>";
    }

    function saveGame() {
      const data = {companyName, denaro, giorno, reputazione, aerei, rotte};
      localStorage.setItem("airlineSave", JSON.stringify(data));
      alert("✅ Partita salvata!");
    }

    function loadGame() {
      const saved = localStorage.getItem("airlineSave");
      if (saved) {
        const d = JSON.parse(saved);
        companyName = d.companyName || companyName;
        denaro = d.denaro; giorno = d.giorno; reputazione = d.reputazione;
        aerei = d.aerei || []; rotte = d.rotte || [];
        document.getElementById("companyDisplay").textContent = companyName;
        log("📂 Partita caricata");
        aggiornaUI();
      }
    }
  </script>
</body>
</html>
