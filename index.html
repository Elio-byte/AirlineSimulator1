<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Airline Simulator</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0e1a url('https://source.unsplash.com/random/1920x1080/?space,stars') no-repeat center center fixed;
      background-size: cover;
      color: #e0f0ff;
      margin: 0;
      padding: 10px;
    }
    .container { max-width: 1100px; margin: auto; }
    h1 {
      text-align: center;
      font-size: 28px;
      color: #4fc3f7;
      text-shadow: 0 0 15px rgba(79, 195, 247, 0.5);
      margin: 15px 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      border: 1px solid rgba(79, 195, 247, 0.2);
    }
    .stats {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
      background: rgba(15, 35, 70, 0.9);
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 15px;
    }
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary { background: #2196f3; color: white; }
    .btn-success { background: #4caf50; color: white; }
    input, select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      background: #1e2937;
      color: white;
      font-size: 16px;
    }
    .log {
      height: 220px;
      overflow-y: auto;
      background: rgba(10, 14, 26, 0.8);
      padding: 15px;
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✈️ THE AIRLINE SIMULATOR</h1>

    <!-- Nome Compagnia -->
    <div id="loginPanel" class="card">
      <h2 style="text-align:center;">Crea la tua Compagnia</h2>
      <input type="text" id="companyName" placeholder="Nome della Compagnia (es. Delta Italia)" />
      <button class="btn-primary" style="width:100%; padding:16px;" onclick="startGame()">INIZIA A GESTIRE</button>
    </div>

    <!-- Schermata Principale -->
    <div id="gamePanel" style="display:none;">
      <div class="stats">
        <div><strong>Compagnia:</strong> <span id="companyDisplay">SkyItalia</span></div>
        <div><strong>Giorno:</strong> <span id="giorno">1</span></div>
        <div><strong>Denaro:</strong> €<span id="denaro">2.500.000</span></div>
        <div><strong>Aerei:</strong> <span id="numAerei">0</span></div>
        <div><strong>Reputazione:</strong> <span id="reputazione">50</span></div>
      </div>

      <div class="card">
        <h2>🛒 Acquista Aerei</h2>
        <select id="aereoSelect">
          <option value="A320">Airbus A320neo - €48M (150 posti)</option>
          <option value="A350">Airbus A350-900 - €288M (300 posti)</option>
          <option value="B737">Boeing 737 MAX - €52M (160 posti)</option>
          <option value="B777">Boeing 777-300ER - €320M (350 posti)</option>
        </select>
        <button class="btn-primary" style="width:100%;" onclick="compraAereo()">ACQUISTA AEREO</button>
      </div>

      <div class="card">
        <h2>🌍 Crea Nuova Rotta</h2>
        <select id="partenza"></select>
        <select id="arrivo"></select>
        <select id="aereoUsato"></select>
        <input type="number" id="prezzo" value="149" placeholder="Prezzo biglietto">
        <button class="btn-success" style="width:100%;" onclick="creaRotta()">CREA ROTTA</button>
      </div>

      <div class="card">
        <button class="btn-primary" style="width:100%; padding:20px; font-size:18px;" onclick="simulaGiorno()">
          ⏩ AVANZA GIORNO
        </button>
      </div>

      <div class="card">
        <h2>Rotte Attive</h2>
        <div id="rotteList"></div>
      </div>

      <div class="card">
        <button onclick="saveGame()" class="btn-success">💾 Salva Partita</button>
        <button onclick="loadGame()" class="btn-primary">📂 Carica Partita</button>
      </div>

      <div class="card">
        <h2>Log Operativo</h2>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <script>
    let companyName = "SkyItalia";
    let denaro = 2500000, giorno = 1, reputazione = 50;
    let aerei = [], rotte = [];

    const aeroporti = ["Roma FCO","Milano MXP","Napoli NAP","Venezia VCE","Palermo PMO","Catania CTA","Bari BRI","Firenze FLR","Londra LHR","Parigi CDG","Madrid MAD","New York JFK","Los Angeles LAX"];

    const market = {
      "A320": {costo: 48000000, capacita: 150, costo_op: 45000},
      "A350": {costo: 288000000, capacita: 300, costo_op: 125000},
      "B737": {costo: 52000000, capacita: 160, costo_op: 48000},
      "B777": {costo: 320000000, capacita: 350, costo_op: 145000}
    };

    function startGame() {
      const name = document.getElementById("companyName").value.trim();
      if (name) companyName = name;

      document.getElementById("loginPanel").style.display = "none";
      document.getElementById("gamePanel").style.display = "block";
      document.getElementById("companyDisplay").textContent = companyName;

      const p = document.getElementById("partenza");
      const a = document.getElementById("arrivo");
      aeroporti.forEach(city => {
        let opt = new Option(city, city);
        p.add(opt.cloneNode(true));
        a.add(opt);
      });

      log(`✈️ Benvenuto a bordo di ${companyName}!`);
      aggiornaUI();
    }

    function aggiornaUI() {
      document.getElementById("denaro").textContent = denaro.toLocaleString('it-IT');
      document.getElementById("giorno").textContent = giorno;
      document.getElementById("numAerei").textContent = aerei.length;
      document.getElementById("reputazione").textContent = reputazione;
      aggiornaRotte();
    }

    function log(msg) {
      const div = document.getElementById("log");
      div.innerHTML += `<div>${msg}</div>`;
      div.scrollTop = div.scrollHeight;
    }

    function compraAereo() {
      const tipo = document.getElementById("aereoSelect").value;
      const a = market[tipo];
      if (denaro >= a.costo) {
        denaro -= a.costo;
        aerei.push({tipo: tipo, ...a});
        log(`✅ Acquistato ${tipo}!`);
        aggiornaUI();
      } else alert("Denaro insufficiente!");
    }

    function creaRotta() {
      if (aerei.length === 0) return alert("Non hai aerei!");
      const partenza = document.getElementById("partenza").value;
      const arrivo = document.getElementById("arrivo").value;
      const idx = document.getElementById("aereoUsato").selectedIndex;
      const prezzo = parseInt(document.getElementById("prezzo").value) || 149;

      rotte.push({partenza, arrivo, prezzo, aereo: aerei[idx]});
      log(`🌍 Rotta creata: ${partenza} → ${arrivo}`);
      aggiornaUI();
    }

    function simulaGiorno() {
      let guadagnoTot = 0;
      log(`<strong>=== GIORNO ${giorno} ===</strong>`);

      for (let r of rotte) {
        const a = r.aereo;
        denaro -= a.costo_op;
        const pax = Math.floor(a.capacita * (0.6 + Math.random() * 0.35));
        const ricavo = pax * r.prezzo;
        const guadagno = ricavo - a.costo_op;
        guadagnoTot += guadagno;
        log(`${r.partenza} → ${r.arrivo} | ${pax} pax | +€${guadagno.toLocaleString('it-IT')}`);
      }

      denaro += guadagnoTot;
      giorno++;

      if (Math.random() < 0.3) {
        reputazione = Math.min(100, reputazione + 10);
        log("🎉 Grande successo! Reputazione aumentata.");
      }

      aggiornaUI();
    }

    function aggiornaRotte() {
      const div = document.getElementById("rotteList");
      div.innerHTML = rotte.length ? rotte.map(r => 
        `<p>✈️ ${r.partenza} → ${r.arrivo} | ${r.aereo.tipo} | €${r.prezzo}</p>`
      ).join('') : "<p>Nessuna rotta attiva.</p>";
    }

    function saveGame() {
      const data = {companyName, denaro, giorno, reputazione, aerei, rotte};
      localStorage.setItem("airlineSave", JSON.stringify(data));
      alert("✅ Partita salvata con successo!");
    }

    function loadGame() {
      const saved = localStorage.getItem("airlineSave");
      if (saved) {
        const d = JSON.parse(saved);
        companyName = d.companyName || companyName;
        denaro = d.denaro; giorno = d.giorno; reputazione = d.reputazione;
        aerei = d.aerei || []; rotte = d.rotte || [];
        document.getElementById("companyDisplay").textContent = companyName;
        log("📂 Partita caricata");
        aggiornaUI();
      }
    }
  </script>
</body>
</html>
